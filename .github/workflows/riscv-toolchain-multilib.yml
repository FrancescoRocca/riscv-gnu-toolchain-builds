name: Build RISC-V toolchain multilib

on:
    workflow_dispatch:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-24.04
        timeout-minutes: 720

        steps:
            - name: Checkout repo
              uses: actions/checkout@v6

            - name: Install dependencies
              run: |
                  sudo apt update
                  sudo apt install -y autoconf automake autotools-dev curl \
                    python3 python3-pip python3-tomli libmpc-dev libmpfr-dev \
                    libgmp-dev gawk build-essential bison flex texinfo gperf \
                    libtool patchutils bc zlib1g-dev libexpat-dev ninja-build \
                    git cmake libglib2.0-dev libslirp-dev libncurses-dev

            - name: Clone riscv-gnu-toolchain
              run: |
                  git clone --depth 1 https://github.com/riscv-collab/riscv-gnu-toolchain.git

            - name: Configure
              run: |
                  cd riscv-gnu-toolchain
                  ./configure \
                    --prefix="$GITHUB_WORKSPACE/riscv" \
                    --enable-multilib

            - name: Build newlib toolchain
              run: |
                  cd riscv-gnu-toolchain
                  make -j$(nproc)

            - name: Package toolchain
              run: |
                  tar -C "$GITHUB_WORKSPACE" -czf riscv-toolchain-multilib.tar.gz riscv

            - name: Upload artifact
              uses: actions/upload-artifact@v7
              with:
                  name: riscv-toolchain-multilib
                  path: riscv-toolchain-multilib.tar.gz
                  compression-level: 0

            - name: Publish release asset
              if: startsWith(github.ref, 'refs/tags/')
              uses: softprops/action-gh-release@v3
              with:
                  files: riscv-toolchain-multilib.tar.gz
